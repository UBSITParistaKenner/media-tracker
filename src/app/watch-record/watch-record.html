<div class="reviews-container">
    <h2>📋 Film Critic Journal</h2>
  
    <div class="reviews-grid">
      @for (w of watchMedia.watchList(); track w._id) {
        <div class="review-card">
          
          <div class="review-header">
            <h3>{{ w.title }}</h3>
            <span class="status-badge">{{ w.status }}</span>
          </div>
  
          <hr class="divider">

          <div class="review-body">
            <p class="quote-text">"{{ w.description }}"</p>
          </div>
  
          <div class="review-footer">
            <small class="meta-tag">🎬 Entry Log: Season {{ w.season }}, Ep {{ w.episode }}</small>
            
            <div class="action-buttons">
              <button type="button" class="btn-edit" (click)="startEdit(w)">Edit Review</button>
              <button type="button" class="btn-delete" (click)="watchMedia.deleteWatch(w._id).subscribe(() => watchMedia.fetchWatch())">Remove Log</button>
            </div>
          </div>
  
        </div>
      } @empty {
        <p class="empty-message">No movie reviews logged today. Type a title above to start reviewing!</p>
      }
    </div>
  </div>
