<h2> {{editingId() ? 'Updating Movie' : 'Register new Movie'}}</h2>

<form [formGroup]="watchForm" (ngSubmit)="onSubmit()">
    <input formControlName="title" placeholder="Title">
    <input formControlName="episode" placeholder="Episodes">
    <input formControlName="season" placeholder="Seasons">
    <input formControlName="description" placeholder="Description">
    <input formControlName="status" placeholder="Status">

    <button type="submit" [disabled]="!watchForm.valid">
        {{ editingId() ? 'Confirm Update : 'Add to Movie List}}
    </button>

    @if (editingId()) {
        <button type="button" (click)="cancelEdit()">Cancel</button>
    }
</form>

    <h2>Current Pokedex</h2>

    @for (p of watchService.watchList(); track p.id) {
        <div class="card">
            <h3>{{ p.name }} (Lvl) {{ p.level }} </h3>
            <p>{{ p.type }} | {{ p.nature }}</p>

            <button type="button" (click)="startEdit(p)">Edit</button>
            <button type="button" (click)="deleteWatch(p.id)">Release</button>
        </div>
    }   @empty {
        <p>No Watch List recorded.</p>
    }
