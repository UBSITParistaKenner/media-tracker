<h2>{{ editingId() ? 'Edit Movie Review' : 'Log a New Film Review' }}</h2>

<form [formGroup]="watchForm" (ngSubmit)="onSubmit()">
  
  <div class="input-group">
    <label>Movie / Series Title:</label>
    <input formControlName="title" placeholder="e.g., Parasite, Heneral Luna...">
  </div>

  <div class="row-inputs">
    <div class="input-group">
      <label>Season / Part:</label>
      <input type="number" formControlName="season" placeholder="e.g., 1">
    </div>
    <div class="input-group">
      <label>Episode / Watch Count:</label>
      <input type="number" formControlName="episode" placeholder="e.g., 1">
    </div>
  </div>

  <div class="input-group">
    <label>Your Verdict Status:</label>
    <input formControlName="status" placeholder="e.g., Masterpiece, Highly Recommended, Must Watch">
  </div>

  <div class="input-group">
    <label>Review Notes & Thoughts:</label>
    <textarea formControlName="description" rows="4" placeholder="Write your breakdown or review here..."></textarea>
  </div>

  <button type="submit" [disabled]="!watchForm.valid">
    {{ editingId() ? 'Confirm Update' : 'Post Review Log' }}
  </button>

  @if (editingId()) {
    <button type="button" (click)="cancelEdit()">Cancel</button>
  }
</form>
